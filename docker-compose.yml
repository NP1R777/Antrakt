version: '3.8'

services:
  # Backend сервис (только API)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:123@db:5432/antrakt_db
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin123
      - MINIO_BUCKET_NAME=antrakt-images
      - PYTHONUNBUFFERED=1
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
    # Убрано монтирование тома, чтобы не перезаписывать собранный образ
    # volumes:
    #   - ./backend:/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend сервис
  frontend:
    build:
      context: ./frontend/antrakt
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./frontend/antrakt/src:/app/src
      - /app/node_modules
    restart: unless-stopped

  # MinIO для хранения изображений.
  # ВАЖНО: версия зафиксирована намеренно. Тег `latest` опасен — обновление
  # версии может изменить формат хранения на диске и «спрятать» ранее
  # загруженные объекты. Обновлять только осознанно и с бэкапом бакета.
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  # PostgreSQL база данных
  db:
    image: postgres:17
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=antrakt_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d antrakt_db"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  minio_data:
    name: minio_data