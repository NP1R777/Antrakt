# Продакшен-развёртка «Норильский народный театр».
# Запуск:  docker compose --env-file .env.prod -f docker-compose.prod.yml up -d --build
#
# Публичные адреса (через Caddy с авто-HTTPS):
#   https://<DOMAIN>       — сайт (React)
#   https://api.<DOMAIN>   — backend (Django/DRF, админка /admin/)
#   https://s3.<DOMAIN>    — изображения (MinIO)
name: antrakt-prod

services:
  db:
    image: postgres:17
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER} -d ${DATABASE_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  minio:
    # Версия зафиксирована намеренно (тег latest может сменить формат хранения).
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    ports:
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # Одноразовое создание бакета и настройка публичного чтения изображений.
  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY} ${MINIO_SECRET_KEY} &&
      mc mb --ignore-existing local/${MINIO_BUCKET_NAME} &&
      mc anonymous set download local/${MINIO_BUCKET_NAME} &&
      echo 'Бакет ${MINIO_BUCKET_NAME} готов (публичное чтение включено)'
      "
    restart: "no"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    env_file:
      - .env.prod
    environment:
      # Инфраструктурные адреса внутри compose-сети.
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      MINIO_ENDPOINT: http://minio:9000
      # Публичный адрес хранилища для ссылок на изображения.
      MINIO_CUSTOM_DOMAIN: s3.${DOMAIN}/${MINIO_BUCKET_NAME}
      MINIO_URL_PROTOCOL: "https:"
      # Прод-безопасность.
      DEBUG: "False"
      SECURE_HTTPS: "True"
      ALLOWED_HOSTS: api.${DOMAIN}
      CORS_ALLOW_ALL_ORIGINS: "False"
      CORS_ALLOWED_ORIGINS: https://${DOMAIN}
      CSRF_TRUSTED_ORIGINS: https://${DOMAIN},https://api.${DOMAIN}
      # Базовый URL сайта для sitemap.xml / robots.txt
      FRONTEND_BASE_URL: https://${DOMAIN}
      PLACEHOLDER_IMAGE_URL: ${PLACEHOLDER_IMAGE_URL:-https://s3.${DOMAIN}/${MINIO_BUCKET_NAME:-antrakt-images}/zaglushka.jpg}
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      # Host + X-Forwarded-Proto: иначе Django отвечает 400 (ALLOWED_HOSTS)
      # или редиректит на HTTPS (SECURE_SSL_REDIRECT) при проверке с localhost.
      test:
        [
          "CMD",
          "curl",
          "-f",
          "-H", "Host: api.${DOMAIN}",
          "-H", "X-Forwarded-Proto: https",
          "http://localhost:8000/health/",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # Периодический авто-перевод «Афиша → Спектакли» (каждую минуту).
  promote-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    env_file:
      - .env.prod
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      MINIO_ENDPOINT: http://minio:9000
      MINIO_CUSTOM_DOMAIN: s3.${DOMAIN}/${MINIO_BUCKET_NAME}
      MINIO_URL_PROTOCOL: "https:"
      DEBUG: "False"
      SECURE_HTTPS: "False"
      ALLOWED_HOSTS: "*"
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started
    entrypoint: >
      /bin/sh -c "while true; do
        python manage.py promote_past_performances || true;
        sleep 60;
      done"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend/antrakt
      dockerfile: Dockerfile.prod
      args:
        REACT_APP_API_URL: https://api.${DOMAIN}
        REACT_APP_MEDIA_URL: https://s3.${DOMAIN}
        REACT_APP_PLACEHOLDER_IMAGE_URL: https://s3.${DOMAIN}/${MINIO_BUCKET_NAME:-antrakt-images}/zaglushka.jpg
    depends_on:
      - backend
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend
      - minio
    restart: unless-stopped

volumes:
  pg_data:
  minio_data:
  caddy_data:
  caddy_config:
